<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COVID Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        #preview {
            display: none;
            max-width: 300px;
            margin: 10px auto;
            border: 2px solid #ddd;
            padding: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>COVID-19 Classifier</h1>
    <p>Upload a chest X-ray image to classify it as Normal, Pneumonia, or COVID-19.</p>

    <input type="file" id="fileInput" accept="image/*">
    <br><br>
    <img id="preview" src="#" alt="Image Preview">
    <br><br>
    <button onclick="uploadImage()">Predict</button>

    <div id="result"></div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function uploadImage() {
            const fileInput = document.getElementById('fileInput').files[0];
            if (!fileInput) {
                alert("Please select an image first.");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput);

            fetch("/predict", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerHTML =
                    `Prediction: ${data.prediction} <br> Confidence: ${(data.confidence * 100).toFixed(2)}%`;
            })
            .catch(error => console.error("Error:", error));
        }
    </script>
</body>
</html>
